x-koffy-environment: &koffy-environment
  APP_ENV: ${APP_ENV:-production}
  LOG_LEVEL: ${LOG_LEVEL:-info}
  PUBLIC_WEB_URL: ${PUBLIC_WEB_URL}
  PUBLIC_GATEWAY_URL: ${PUBLIC_GATEWAY_URL}
  PUBLIC_CASDOOR_URL: ${PUBLIC_CASDOOR_URL}
  MYSQL_HOST: mysql
  MYSQL_PORT: "3306"
  MYSQL_DATABASE: ${MYSQL_DATABASE:-koffy}
  MYSQL_USER: ${MYSQL_USER:-koffy_user}
  MYSQL_PASSWORD: ${MYSQL_PASSWORD}
  REDIS_ADDR: redis:6379
  REDIS_PASSWORD: ${REDIS_PASSWORD}
  REDIS_DB: ${REDIS_DB:-0}
  CASDOOR_ENDPOINT: http://casdoor:8000
  CASDOOR_CLIENT_ID: ${CASDOOR_CLIENT_ID}
  CASDOOR_CLIENT_SECRET: ${CASDOOR_CLIENT_SECRET}
  CASDOOR_CERTIFICATE: ${CASDOOR_CERTIFICATE}
  CASDOOR_ORGANIZATION_NAME: ${CASDOOR_ORGANIZATION_NAME:-koffy}
  CASDOOR_APPLICATION_NAME: ${CASDOOR_APPLICATION_NAME:-koffy-production}
  REGISTRATION_SMS_PROVIDER: ${REGISTRATION_SMS_PROVIDER:-}
  AUTH_ALLOWED_RETURN_ORIGINS: ${AUTH_ALLOWED_RETURN_ORIGINS:-}
  CAPTCHA_ENABLED: ${CAPTCHA_ENABLED:-false}
  CAPTCHA_PROVIDER: ${CAPTCHA_PROVIDER:-none}
  CAPTCHA_SITE_KEY: ${CAPTCHA_SITE_KEY:-}
  CAPTCHA_SECRET: ${CAPTCHA_SECRET:-}
  CAPTCHA_VERIFY_URL: ${CAPTCHA_VERIFY_URL:-}
  TENCENT_CLOUD_SECRET_ID: ${TENCENT_CLOUD_SECRET_ID:-}
  TENCENT_CLOUD_SECRET_KEY: ${TENCENT_CLOUD_SECRET_KEY:-}
  TENCENT_CAPTCHA_APP_ID: ${TENCENT_CAPTCHA_APP_ID:-}
  TENCENT_CAPTCHA_APP_SECRET_KEY: ${TENCENT_CAPTCHA_APP_SECRET_KEY:-}
  WECHAT_OFFICIAL_APP_ID: ${WECHAT_OFFICIAL_APP_ID:-}
  WECHAT_OFFICIAL_APP_SECRET: ${WECHAT_OFFICIAL_APP_SECRET:-}
  WECHAT_WEBSITE_APP_ID: ${WECHAT_WEBSITE_APP_ID:-}
  WECHAT_WEBSITE_APP_SECRET: ${WECHAT_WEBSITE_APP_SECRET:-}
  BILLING_API_ADDR: :8080
  BILLING_API_URL: http://koffy-billing-api:8080
  BILLING_INTERNAL_API_KEY: ${BILLING_INTERNAL_API_KEY}
  COIN_EXCHANGE_RATE_CNY: ${COIN_EXCHANGE_RATE_CNY:-100}
  ENTITLEMENT_MAINTENANCE_INTERVAL_MINUTES: ${ENTITLEMENT_MAINTENANCE_INTERVAL_MINUTES:-60}
  AI_GATEWAY_ADDR: :8081
  LITELLM_BASE_URL: http://litellm:4000
  LITELLM_MASTER_KEY: ${LITELLM_MASTER_KEY}
  AI_GATEWAY_DEFAULT_PREAUTH_TOKENS: ${AI_GATEWAY_DEFAULT_PREAUTH_TOKENS:-2000}
  AI_GATEWAY_APP_RATE_LIMIT_PER_MINUTE: ${AI_GATEWAY_APP_RATE_LIMIT_PER_MINUTE:-600}
  AI_GATEWAY_USER_RATE_LIMIT_PER_MINUTE: ${AI_GATEWAY_USER_RATE_LIMIT_PER_MINUTE:-120}
  WECHAT_PAY_ENABLED: ${WECHAT_PAY_ENABLED:-false}
  WECHAT_PAY_MCH_ID: ${WECHAT_PAY_MCH_ID:-}
  WECHAT_PAY_APP_ID: ${WECHAT_PAY_APP_ID:-}
  WECHAT_PAY_API_V3_KEY: ${WECHAT_PAY_API_V3_KEY:-}
  WECHAT_PAY_MCH_CERT_SERIAL_NO: ${WECHAT_PAY_MCH_CERT_SERIAL_NO:-}
  WECHAT_PAY_PRIVATE_KEY_PATH: ${WECHAT_PAY_PRIVATE_KEY_PATH:-/app/secrets/wechat_pay_private_key.pem}
  WECHAT_PAY_PUBLIC_KEY_ID: ${WECHAT_PAY_PUBLIC_KEY_ID:-}
  WECHAT_PAY_PUBLIC_KEY_PATH: ${WECHAT_PAY_PUBLIC_KEY_PATH:-/app/secrets/wechat_pay_public_key.pem}
  WECHAT_PAY_NOTIFY_URL: ${WECHAT_PAY_NOTIFY_URL:-}
  ALIPAY_PAY_ENABLED: ${ALIPAY_PAY_ENABLED:-false}
  ALIPAY_APP_ID: ${ALIPAY_APP_ID:-}
  ALIPAY_PRIVATE_KEY_PATH: ${ALIPAY_PRIVATE_KEY_PATH:-/app/secrets/alipay_private_key.pem}
  ALIPAY_PUBLIC_KEY: ${ALIPAY_PUBLIC_KEY:-}
  ALIPAY_PUBLIC_KEY_PATH: ${ALIPAY_PUBLIC_KEY_PATH:-/app/secrets/alipay_public_key.pem}
  ALIPAY_APP_CERT_PATH: ${ALIPAY_APP_CERT_PATH:-}
  ALIPAY_CERT_PATH: ${ALIPAY_CERT_PATH:-}
  ALIPAY_ROOT_CERT_PATH: ${ALIPAY_ROOT_CERT_PATH:-}
  ALIPAY_NOTIFY_URL: ${ALIPAY_NOTIFY_URL:-}
  ALIPAY_RETURN_URL: ${ALIPAY_RETURN_URL:-}
  ALIPAY_PRODUCTION: ${ALIPAY_PRODUCTION:-true}

services:
  mysql:
    image: ${MYSQL_IMAGE:-mysql:8.4}
    container_name: koffy-mysql
    restart: always
    environment:
      MYSQL_ROOT_PASSWORD: ${MYSQL_ROOT_PASSWORD}
      MYSQL_DATABASE: ${MYSQL_DATABASE:-koffy}
      MYSQL_USER: ${MYSQL_USER:-koffy_user}
      MYSQL_PASSWORD: ${MYSQL_PASSWORD}
    command:
      - --character-set-server=utf8mb4
      - --collation-server=utf8mb4_0900_ai_ci
      - --default-time-zone=+08:00
    volumes:
      - mysql_data:/var/lib/mysql
      - ./deployments/mysql/000-create-databases.sh:/docker-entrypoint-initdb.d/000-create-databases.sh:ro
      - ./migrations/001_init.sql:/docker-entrypoint-initdb.d/001_init.sql:ro
    healthcheck:
      test: ["CMD-SHELL", "mysqladmin ping -h 127.0.0.1 -uroot -p\"$$MYSQL_ROOT_PASSWORD\" --silent"]
      interval: 10s
      timeout: 5s
      retries: 20
    networks: [koffy]

  redis:
    image: ${REDIS_IMAGE:-redis:8.4-alpine}
    container_name: koffy-redis
    restart: always
    environment:
      REDIS_PASSWORD: ${REDIS_PASSWORD}
    command: ["sh", "-c", "exec redis-server --appendonly yes --requirepass \"$$REDIS_PASSWORD\""]
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD-SHELL", "redis-cli -a \"$$REDIS_PASSWORD\" ping 2>/dev/null | grep -q PONG"]
      interval: 10s
      timeout: 5s
      retries: 20
    networks: [koffy]

  casdoor:
    image: ${CASDOOR_IMAGE:-casbin/casdoor:3.60.2}
    container_name: koffy-casdoor
    restart: always
    environment:
      driverName: mysql
      dataSourceName: ${MYSQL_USER:-koffy_user}:${MYSQL_PASSWORD}@tcp(mysql:3306)/
      dbName: casdoor
      origin: ${PUBLIC_CASDOOR_URL}
      runmode: prod
    depends_on:
      mysql:
        condition: service_healthy
    networks: [koffy]

  litellm:
    image: ${LITELLM_IMAGE:-ghcr.io/berriai/litellm:latest}
    container_name: koffy-litellm
    restart: always
    command: ["--config", "/app/config.yaml"]
    environment:
      OPENAI_API_KEY: ${OPENAI_API_KEY}
      LITELLM_MASTER_KEY: ${LITELLM_MASTER_KEY}
    volumes:
      - ${LITELLM_CONFIG_FILE:-./deployments/litellm/config.yaml}:/app/config.yaml:ro
    healthcheck:
      test: ["CMD-SHELL", "python - <<'PY'\nimport urllib.request\nurllib.request.urlopen('http://127.0.0.1:4000/health/liveliness', timeout=3)\nPY"]
      interval: 30s
      timeout: 5s
      retries: 10
    networks: [koffy]

  koffy-billing-api:
    image: ${KOFFY_BILLING_API_IMAGE}
    container_name: koffy-billing-api
    restart: always
    environment:
      <<: *koffy-environment
    volumes:
      - ./secrets:/app/secrets:ro
    depends_on:
      mysql:
        condition: service_healthy
      redis:
        condition: service_healthy
      casdoor:
        condition: service_started
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://127.0.0.1:8080/readyz >/dev/null 2>&1 || exit 1"]
      interval: 30s
      timeout: 5s
      retries: 10
    networks: [koffy]

  koffy-gateway:
    image: ${KOFFY_GATEWAY_IMAGE}
    container_name: koffy-gateway
    restart: always
    environment:
      <<: *koffy-environment
    depends_on:
      koffy-billing-api:
        condition: service_healthy
      litellm:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://127.0.0.1:8081/readyz >/dev/null 2>&1 || exit 1"]
      interval: 30s
      timeout: 5s
      retries: 10
    networks: [koffy]

  koffy-web:
    image: ${KOFFY_WEB_IMAGE}
    container_name: koffy-web
    restart: always
    depends_on:
      koffy-billing-api:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://127.0.0.1:3000/ >/dev/null 2>&1 || exit 1"]
      interval: 30s
      timeout: 5s
      retries: 10
    networks: [koffy]

  nginx:
    image: ${NGINX_IMAGE:-nginx:1.27-alpine}
    container_name: koffy-nginx
    restart: always
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ${KOFFY_NGINX_CONFIG:-./deployments/nginx/koffy.conf}:/etc/nginx/conf.d/default.conf:ro
      - ${KOFFY_CERTS_DIR:-./certs}:/etc/nginx/certs:ro
    depends_on:
      casdoor:
        condition: service_started
    healthcheck:
      test: ["CMD-SHELL", "nginx -t >/dev/null 2>&1"]
      interval: 30s
      timeout: 5s
      retries: 3
    networks: [koffy]

networks:
  koffy:
    name: ${KOFFY_DOCKER_NETWORK:-koffy}

volumes:
  mysql_data:
  redis_data:
